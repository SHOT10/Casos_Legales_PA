<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expedientes — Casos Legales PA</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <div class="shell">
    {% include "_rail.html" %}

    <main class="main">
      <button class="mobile-toggle" data-mobile-toggle>☰</button>

      <div class="topline">
        <div>
          <span class="eyebrow">Expedientes</span>
          <h2>Todos los casos</h2>
        </div>
        <button class="btn" id="btnNuevo">+ Nuevo expediente</button>
      </div>

      <div class="toolbar">
        <input type="text" id="fBuscar" placeholder="Buscar por número o asegurado…">
        <select id="fEstado">
          <option value="">Todos los estados</option>
          <option value="Pendiente">Pendiente</option>
          <option value="En curso">En curso</option>
          <option value="Cerrado">Cerrado</option>
        </select>
        <select id="fAseguradora"><option value="">Todas las aseguradoras</option></select>
        <span class="spacer"></span>
        <span class="docket" id="totalCount"></span>
      </div>

      <section class="panel">
        <div class="panel__body" style="overflow-x:auto;">
          <table class="grid">
            <thead>
              <tr>
                <th>Expediente</th>
                <th>Asegurado</th>
                <th>Aseguradora</th>
                <th>Juzgado</th>
                <th>Estado</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tablaBody">
              <tr><td colspan="6" class="empty">Cargando…</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- Modal crear/editar expediente -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modal__head">
        <h3 id="modalTitle">Nuevo expediente</h3>
        <button class="modal__close" data-close-modal>&times;</button>
      </div>
      <form id="expForm">
        <div class="modal__body">
          <div class="field">
            <label for="numero_expediente">Número de expediente</label>
            <input type="text" id="numero_expediente" required placeholder="EXP-2026-001">
          </div>
          <div class="field">
            <label for="asegurado_nombre">Nombre del asegurado</label>
            <input type="text" id="asegurado_nombre" required placeholder="Nombre completo">
          </div>
          <div class="field-row">
            <div class="field">
              <label for="id_aseguradora">Aseguradora</label>
              <select id="id_aseguradora" required></select>
            </div>
            <div class="field">
              <label for="id_juzgado">Juzgado</label>
              <select id="id_juzgado" required></select>
            </div>
          </div>
          <div class="field">
            <label for="id_estado">Estado</label>
            <select id="id_estado" required></select>
          </div>
          <div class="field">
            <label for="descripcion">Descripción</label>
            <textarea id="descripcion" rows="3" placeholder="Notas del caso (opcional)"></textarea>
          </div>
        </div>
        <div class="modal__foot">
          <button type="button" class="btn btn--ghost" data-close-modal>Cancelar</button>
          <button type="submit" class="btn" id="btnGuardar">Guardar expediente</button>
        </div>
      </form>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/api.js') }}"></script>
  <script src="{{ url_for('static', filename='js/expedientes.js') }}"></script>
</body>
</html>
